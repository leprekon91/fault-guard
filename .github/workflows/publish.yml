name: Publish package

on:
  workflow_dispatch:
    inputs:
      releaseTag:
        description: 'Tag to publish (e.g. v1.2.3). If empty, publishes current branch.'
        required: false
        default: ''
      dryRun:
        description: 'If true, run `npm pack` instead of `npm publish`.'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Checkout tag if provided
        run: |
          if [ "${{ github.event.inputs.releaseTag }}" != "" ]; then
            git fetch --tags
            git checkout "${{ github.event.inputs.releaseTag }}"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then
            npm pack
          else
            npm publish --access public
          fi
