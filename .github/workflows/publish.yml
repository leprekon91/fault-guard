name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write   # REQUIRED for npm trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: '@leprekon-hub'
          always-auth: true

      - name: Verify OIDC authentication to npm
        run: |
          echo "Verifying npm authentication via OIDC..."
          npm whoami || (echo "OIDC not configured on npm for this repo/scope" && exit 1)

      - run: npm ci

      - run: npm run build --if-present

      - run: npm publish --provenance --access public
