name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # REQUIRED for npm trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: '@leprekon-hub'
          always-auth: true

      - name: Verify OIDC authentication to npm
        run: |
          echo "Verifying npm authentication via OIDC..."
          npm whoami || (echo "OIDC not configured on npm for this repo/scope" && exit 1)
      - name: Debug OIDC sub claim
        run: |
          TOKEN_JSON=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL")
          TOKEN=$(printf '%s' "$TOKEN_JSON" | jq -r .value)
          PAYLOAD=$(printf '%s' "$TOKEN" | cut -d '.' -f2 | tr '_-' '/+')
          MOD=$(( ${#PAYLOAD} % 4 )); [ $MOD -ne 0 ] && PAD=$((4-MOD)) && PAYLOAD="$PAYLOAD$(printf '=%.0s' $(seq 1 $PAD))"
          printf '%s' "$PAYLOAD" | base64 -d 2>/dev/null | jq -r '.sub

      - run: npm ci

      - run: npm run build --if-present

      - run: npm publish --provenance --access public
