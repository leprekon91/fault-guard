name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write # REQUIRED for npm trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: '@leprekon-hub'

      - run: npm ci

      - run: npm run build --if-present

      # Remove the auth token placeholder so npm uses OIDC for trusted publishing
      - run: sed -i '/_authToken/d' "$GITHUB_WORKSPACE/.npmrc"

      - run: npm publish --provenance --access public
